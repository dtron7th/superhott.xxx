            .Dev_Settings {

        <script aria-label="Dev_Settings_Script">

            const devSettings = document.querySelector('.Dev_Settings');
            let isDragging = false;
            let offsetX, offsetY;

            devSettings.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - devSettings.offsetLeft;
                offsetY = e.clientY - devSettings.offsetTop;
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.clientX - offsetX) + 'px';
                    devSettings.style.top = (e.clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
            });

            devSettings.addEventListener('touchstart', function(e) {
                isDragging = true;
                offsetX = e.touches[0].clientX - devSettings.offsetLeft;
                offsetY = e.touches[0].clientY - devSettings.offsetTop;
            });

            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.touches[0].clientX - offsetX) + 'px';
                    devSettings.style.top = (e.touches[0].clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });
            
        
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Lables').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-labels-style';
                    const existingStyle = document.getElementById('dev-labels-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '*::before { display: flex !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
            
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Border').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-border-style';
                    const existingStyle = document.getElementById('dev-border-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '* { border: 1px solid red !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
        </script>

            <script aria-label="Ascii_Logo_Script">
                (function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const asciiLogo = document.querySelector('.Ascii_Logo');
                    asciiLogo.innerHTML = '';
                    asciiLogo.appendChild(canvas);
                    canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';

                    const logoContainer = document.createElement('div');
                    logoContainer.style.cssText = 'position:absolute;top:80px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;';
                    asciiLogo.appendChild(logoContainer);

                    const asciiArt = document.createElement('pre');
                    asciiArt.id = 'Ascii_Logo_Text';
                    asciiArt.style.cssText = 'font-family:"Courier New",monospace;font-size:6px;line-height:1.1;color:#ff4477;text-shadow:0 0 8px rgba(255,68,119,0.6);white-space:pre;text-align:center;letter-spacing:0;margin:0;padding:10px;';
                    logoContainer.appendChild(asciiArt);

                    const asciiLines = [
                        '███╗   ███╗██╗   ██╗    ██╗     ███████╗███████╗██████╗ ██╗ █████╗ ███╗   ██╗',
                        '████╗ ████║╚██╗ ██╔╝    ██║     ██╔════╝██╔════╝██╔══██╗██║██╔══██╗████╗  ██║',
                        '██╔████╔██║ ╚████╔╝     ██║     █████╗  ███████╗██████╔╝██║███████║██╔██╗ ██║',
                        '██║╚██╔╝██║  ╚██╔╝      ██║     ██╔══╝  ╚════██║██╔══██╗██║██╔══██║██║╚██╗██║',
                        '██║ ╚═╝ ██║   ██║       ███████╗███████╗███████║██████╔╝██║██║  ██║██║ ╚████║',
                        '╚═╝     ╚═╝   ╚═╝       ╚══════╝╚══════╝╚══════╝╚═════╝ ╚═╝╚═╝  ╚═╝╚═╝  ╚═══╝',
                        '                ███████╗████████╗ ██████╗ ██████╗ ██╗   ██╗                  ',
                        '                ██╔════╝╚══██╔══╝██╔═══██╗██╔══██╗╚██╗ ██╔╝                  ',
                        '                ███████╗   ██║   ██║   ██║██████╔╝ ╚████╔╝                   ',
                        '                ╚════██║   ██║   ██║   ██║██╔══██╗  ╚██╔╝                    ',
                        '                ███████║   ██║   ╚██████╔╝██║  ██║   ██║                     ',
                        '                ╚══════╝   ╚═╝    ╚═════╝ ╚═╝  ╚═╝   ╚═╝                     '
                    ];

                    let lineIndex = 0;
                    let charIndex = 0;
                    let currentDisplay = [];
                    
                    function typeText() {
                        if (lineIndex < asciiLines.length) {
                            if (charIndex === 0) {
                                currentDisplay.push('');
                            }
                            if (charIndex < asciiLines[lineIndex].length) {
                                currentDisplay[lineIndex] += asciiLines[lineIndex].charAt(charIndex);
                                asciiArt.textContent = currentDisplay.join('\n');
                                charIndex++;
                                setTimeout(typeText, 2);
                            } else {
                                lineIndex++;
                                charIndex = 0;
                                setTimeout(typeText, 30);
                            }
                        }
                    }
                    setTimeout(typeText, 50);

                    function resizeCanvas() {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                    }
                    resizeCanvas();

                    const fontSize = 12;
                    const targetFps = 18;
                    const frameDuration = 1000 / targetFps;
                    const chars = 'あぁかさたなはまやゃらわがざだばぱいぃきしちにひみりゐぎじぢびぴABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?<>[]{}|~^';
                    
                    let columns = Math.floor(canvas.width / fontSize);
                    let drops = [];
                    let columnHues = [];
                    let nextColorChangeTime = [];
                    let dropSpeeds = [];
                    
                    function initDrops() {
                        resizeCanvas();
                        columns = Math.floor(canvas.width / fontSize);
                        drops = [];
                        columnHues = [];
                        nextColorChangeTime = [];
                        dropSpeeds = [];
                        for (let i = 0; i < columns; i++) {
                            drops[i] = Math.random() * -50;
                            columnHues[i] = Math.random() * 360;
                            nextColorChangeTime[i] = Date.now() + Math.random() * 3000 + 500;
                            dropSpeeds[i] = Math.random() * 0.5 + 0.5;
                        }
                    }
                    initDrops();
                    window.addEventListener('resize', initDrops);

                    let lastFrameTime = 0;
                    
                    function draw() {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        ctx.font = fontSize + 'px "Courier New", monospace';
                        
                        const now = Date.now();

                        for (let i = 0; i < drops.length; i++) {
                            if (now >= nextColorChangeTime[i]) {
                                columnHues[i] = Math.random() * 360;
                                nextColorChangeTime[i] = now + Math.random() * 3000 + 500;
                            }
                            
                            const char = chars[Math.floor(Math.random() * chars.length)];
                            const x = i * fontSize;
                            const y = drops[i] * fontSize;
                            
                            const hue = columnHues[i];
                            
                            ctx.shadowColor = `hsla(${hue}, 100%, 70%, 0.8)`;
                            ctx.shadowBlur = 0;
                            ctx.fillStyle = `hsla(${hue}, 100%, 70%, 1)`;
                            
                            ctx.fillText(char, x, y);
                            
                            const trailLength = 3 + Math.floor(Math.random() * 3);
                            for (let t = 1; t <= trailLength; t++) {
                                const trailY = (drops[i] - t) * fontSize;
                                const trailChar = chars[Math.floor(Math.random() * chars.length)];
                                const opacity = 1 - (t / (trailLength + 1));
                                ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${opacity * 0.6})`;
                                ctx.fillText(trailChar, x, trailY);
                            }
                            
                            ctx.shadowBlur = 0;
                            
                            if (y > canvas.height && Math.random() > 0.95) {
                                drops[i] = 0;
                                dropSpeeds[i] = Math.random() * 0.5 + 0.5;
                            }
                            
                            drops[i] += dropSpeeds[i];
                        }
                    }

                    function animate(timestamp) {
                        if (!lastFrameTime || timestamp - lastFrameTime >= frameDuration) {
                            draw();
                            lastFrameTime = timestamp;
                        }
                        requestAnimationFrame(animate);
                    }

                    requestAnimationFrame(animate);
                })();
                
            </script>

                    <!-- --Book_Mark - (PDF417_Scanner Styles)--------------------- -->
                    <style aria-label="PDF417_Scanner_Window_Style">
                        .PDF417_Scanner {
                            width: calc(100% - 60px);

                    </style>

                    <!-- --Book_Mark - (PDF417_Scanner Script)--------------------- -->
                    <script aria-label="PDF417_Scanner_Script">
                        (function () {
                            const scannerHost = document.querySelector('.PDF417_Scanner');
                            const openButton = document.getElementById('Scan_ID_Button');
                            const closeButton = document.getElementById('PDF417_Scanner_Close');

                            if (!scannerHost || !openButton || scannerHost.dataset.pdf417Init === 'true') {
                                return;
                            }
                            scannerHost.dataset.pdf417Init = 'true';

                            scannerHost.style.position = 'relative';
                            scannerHost.style.overflow = 'hidden';

                            const preview = document.createElement('video');
                            preview.className = 'PDF417_Preview';
                            preview.setAttribute('playsinline', 'true');
                            preview.autoplay = true;
                            preview.muted = true;
                            preview.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
                            scannerHost.appendChild(preview);

                            const sightOverlay = document.createElement('div');
                            sightOverlay.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:2;';

                            const corners = [
                                { top: '10px', left: '10px', borderTop: '2px solid #00ff99', borderLeft: '2px solid #00ff99' },
                                { top: '10px', right: '10px', borderTop: '2px solid #00ff99', borderRight: '2px solid #00ff99' },
                                { bottom: '10px', left: '10px', borderBottom: '2px solid #00ff99', borderLeft: '2px solid #00ff99' },
                                { bottom: '10px', right: '10px', borderBottom: '2px solid #00ff99', borderRight: '2px solid #00ff99' }
                            ];

                            corners.forEach(function (cornerStyle) {
                                const corner = document.createElement('div');
                                corner.style.position = 'absolute';
                                corner.style.width = '26px';
                                corner.style.height = '26px';
                                Object.keys(cornerStyle).forEach(function (k) {
                                    corner.style[k] = cornerStyle[k];
                                });
                                sightOverlay.appendChild(corner);
                            });

                            const reticle = document.createElement('div');
                            reticle.style.cssText = 'position:absolute;left:50%;top:50%;width:280px;max-width:95%;height:104px;transform:translate(-50%,-50%);border:1px dashed rgba(0,255,153,.9);box-shadow:0 0 12px rgba(0,255,153,.35);';
                            sightOverlay.appendChild(reticle);
                            scannerHost.appendChild(sightOverlay);

                            let stream = null;
                            let detector = null;
                            let running = false;
                            let animationFrameId = null;
                            let lastRawValue = '';
                            let lastScanAt = 0;
                            let audioContext = null;
                            let html5QrCode = null;
                            let usingFallbackScanner = false;

                            const terminal = document.getElementById('Terminal_Text');
                            const logWindow = document.querySelector('.Log_Window');
                            const scannerWindow = document.querySelector('.PDF417_Scanner_Window');
                            const scannerWindows = document.querySelector('.Scanner_Windows');

                            function debugBeep() {
                                try {
                                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                                    if (!AudioCtx) { return; }
                                    if (!audioContext) { audioContext = new AudioCtx(); }
                                    if (audioContext.state === 'suspended') { audioContext.resume(); }
                                    const oscillator = audioContext.createOscillator();
                                    const gainNode = audioContext.createGain();
                                    oscillator.type = 'sine';
                                    oscillator.frequency.value = 1046.5;
                                    gainNode.gain.value = 0.14;
                                    oscillator.connect(gainNode);
                                    gainNode.connect(audioContext.destination);
                                    oscillator.start();
                                    oscillator.stop(audioContext.currentTime + 0.16);
                                } catch (error) { }
                            }

                            function primeAudioContext() {
                                try {
                                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                                    if (!AudioCtx) { return; }
                                    if (!audioContext) { audioContext = new AudioCtx(); }
                                    if (audioContext.state === 'suspended') { audioContext.resume(); }
                                } catch (error) { }
                            }

                            function flashDetection() {
                                scannerHost.style.boxShadow = 'inset 0 0 0 2px #00ff99, 0 0 18px rgba(0,255,153,.8)';
                                setTimeout(function () {
                                    scannerHost.style.boxShadow = 'none';
                                }, 150);
                            }

                            function parseAamva(rawText) {
                                const cleaned = (rawText || '').replace(/[\u001e\u001f]/g, '\n').replace(/\r/g, '\n');
                                const lines = cleaned.split('\n').map(function (line) { return line.trim(); }).filter(Boolean);
                                const fields = {};

                                function extractLicenseFromRaw(text) {
                                    const normalized = String(text || '').replace(/\s+/g, ' ');
                                    const patterns = [
                                        /DAQ\s*([A-Z0-9-]{4,})/i,
                                        /DLN\s*([A-Z0-9-]{4,})/i,
                                        /LIC(?:ENSE)?\s*(?:NUMBER|NO|#)?\s*[:#-]?\s*([A-Z0-9-]{4,})/i
                                    ];
                                    for (var i = 0; i < patterns.length; i++) {
                                        const match = normalized.match(patterns[i]);
                                        if (match && match[1]) { return match[1].trim(); }
                                    }
                                    return null;
                                }

                                lines.forEach(function (line) {
                                    const match = line.match(/^(D[A-Z0-9]{2})(.*)$/);
                                    if (match) { fields[match[1]] = match[2].trim(); }
                                });

                                if (!Object.keys(fields).length) {
                                    const compact = cleaned.replace(/\n+/g, ' ');
                                    const tokenPattern = /(D[A-Z0-9]{2})([\s\S]*?)(?=D[A-Z0-9]{2}|$)/g;
                                    let tokenMatch;
                                    while ((tokenMatch = tokenPattern.exec(compact)) !== null) {
                                        const key = tokenMatch[1];
                                        const value = (tokenMatch[2] || '').trim();
                                        if (key && value && !fields[key]) { fields[key] = value; }
                                    }
                                }

                                const resolvedLicenseNumber = (fields.DAQ || '').trim() || extractLicenseFromRaw(cleaned) || extractLicenseFromRaw(rawText) || null;

                                return {
                                    firstName: fields.DAC || null,
                                    middleName: fields.DAD || null,
                                    lastName: fields.DCS || null,
                                    nameSuffix: fields.DCU || null,
                                    fullName: [fields.DAC, fields.DAD, fields.DCS, fields.DCU].filter(Boolean).join(' ').trim() || null,
                                    licenseNumber: resolvedLicenseNumber,
                                    dateOfBirth: fields.DBB || null,
                                    expirationDate: fields.DBA || null,
                                    issueDate: fields.DBD || null,
                                    sex: fields.DBC || null,
                                    street: fields.DAG || null,
                                    city: fields.DAI || null,
                                    state: fields.DAJ || null,
                                    postalCode: fields.DAK || null,
                                    rawFields: fields
                                };
                            }

                            function writeScanToTerminal(scan) {
                                if (!terminal || !scan || !scan.parsed) { return; }
                                const parsed = scan.parsed;
                                const lines = [
                                    'My Lesbian Story',
                                    'User:\\> ',
                                    'Scan successful:',
                                    'Full Name: ' + (parsed.fullName || '-'),
                                    'License Number: ' + (parsed.licenseNumber || '-'),
                                    'DOB: ' + (parsed.dateOfBirth || '-'),
                                    'Expires: ' + (parsed.expirationDate || '-'),
                                    'Address: ' + [parsed.street, parsed.city, parsed.state, parsed.postalCode].filter(Boolean).join(', '),
                                    '',
                                    'RAW:',
                                    String(scan.raw || '')
                                ];

                            function parseDobToDate(rawDob) {
                                var digits = String(rawDob || '').replace(/\D/g, '');
                                if (digits.length !== 8) {
                                    return null;
                                }

                                var year;
                                var month;
                                var day;

                                if (/^(19|20)\d{2}/.test(digits)) {
                                    year = Number(digits.slice(0, 4));
                                    month = Number(digits.slice(4, 6));
                                    day = Number(digits.slice(6, 8));
                                } else {
                                    month = Number(digits.slice(0, 2));
                                    day = Number(digits.slice(2, 4));
                                    year = Number(digits.slice(4, 8));
                                }

                                var date = new Date(year, month - 1, day);
                                if (
                                    date.getFullYear() !== year ||
                                    date.getMonth() !== month - 1 ||
                                    date.getDate() !== day
                                ) {
                                    return null;
                                }

                                return date;
                            }

                            function calculateAge(rawDob) {
                                var birthDate = parseDobToDate(rawDob);
                                if (!birthDate) {
                                    return null;
                                }

                                var today = new Date();
                                var age = today.getFullYear() - birthDate.getFullYear();
                                var monthDiff = today.getMonth() - birthDate.getMonth();
                                var dayDiff = today.getDate() - birthDate.getDate();

                                if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
                                    age -= 1;
                                }

                                return age;
                            }

                            function clearPendingYesFlowTimers() {
                                pendingYesFlowTimers.forEach(function (timerId) {
                                    clearTimeout(timerId);
                                });
                                pendingYesFlowTimers = [];
                            }

                            updateUserCount();
                            startCounterStream();
                            startCounterPolling();
                            renderTerminal();

                            document.addEventListener('visibilitychange', function () {
                                if (!document.hidden) {
                                    updateUserCount();
                                    startCounterStream();
                                    startCounterPolling();
                                }
                            });

                            window.addEventListener('beforeunload', function () {
                                if (counterStream) {
                                    counterStream.close();
                                    counterStream = null;
                                }
                                if (counterStreamRetryTimer) {
                                    clearTimeout(counterStreamRetryTimer);
                                    counterStreamRetryTimer = null;
                                }
                                if (counterPollTimer) {
                                    clearInterval(counterPollTimer);
                                    counterPollTimer = null;
                                }
                            });

                            if (scanner) {
                                scanner.addEventListener('pdf417-scan', async function (event) {
                                    var detail = event && event.detail;
                                    var parsed = detail && detail.parsed;
                                    if (await hasMatchingStoredAccount(parsed)) {
                                        if (logWindow) {
                                            logWindow.style.display = 'none';
                                        }
                                        if (scannerWindows) {
                                            scannerWindows.style.display = 'none';
                                        }
                                        return;
                                    }

                                    var formatted = formatScan(event.detail);
                                    renderTerminal(formatted.baseLines);

                                    if (pendingEligibilityTimer) {
                                        clearTimeout(pendingEligibilityTimer);
                                        pendingEligibilityTimer = null;
                                    }
                                    if (pendingUnderageCloseTimer) {
                                        clearTimeout(pendingUnderageCloseTimer);
                                        pendingUnderageCloseTimer = null;
                                    }
                                    if (pendingUnderageExitTimer) {
                                        clearTimeout(pendingUnderageExitTimer);
                                        pendingUnderageExitTimer = null;
                                    }
                                    if (pendingAccountPromptTimer) {
                                        clearTimeout(pendingAccountPromptTimer);
                                        pendingAccountPromptTimer = null;
                                    }
                                    if (pendingNoCloseTimer) {
                                        clearTimeout(pendingNoCloseTimer);
                                        pendingNoCloseTimer = null;
                                    }
                                    clearPendingYesFlowTimers();

                                    if (formatted.delayedLines && formatted.delayedLines.length) {
                                        pendingEligibilityTimer = setTimeout(function () {
                                            renderTerminal(formatted.baseLines.concat(formatted.delayedLines));
                                            pendingEligibilityTimer = null;

                                            if (formatted.accountPromptLines && formatted.accountPromptLines.length) {
                                                pendingAccountPromptTimer = setTimeout(function () {
                                                    var promptSectionLines = formatted.baseLines.concat(
                                                        formatted.delayedLines,
                                                        formatted.accountPromptLines
                                                    );
                                                    renderTerminal(promptSectionLines);
                                                    pendingAccountPromptTimer = null;
                                                    attachAccountPromptHandler(formatted, promptSectionLines);
                                                }, formatted.accountPromptDelayMs || 1000);
                                            }

                                            if (formatted.underageCloseDelayMs > 0) {
                                                pendingUnderageCloseTimer = setTimeout(function () {
                                                    renderTerminal(
                                                        formatted.baseLines.concat(
                                                            formatted.delayedLines,
                                                            ['', { text: 'Must be 21 or over to enter', color: '#ff4d4d' }]
                                                        )
                                                    );
                                                    pendingUnderageCloseTimer = null;

                                                    pendingUnderageExitTimer = setTimeout(function () {
                                                        try {
                                                            window.open('', '_self');
                                                            window.close();
                                                        } catch (error) {
                                                            // ignore close errors
                                                        }
                                                        if (!window.closed) {
                                                            window.location.href = 'about:blank';
                                                        }
                                                        pendingUnderageExitTimer = null;
                                                    }, 1000);
                                                }, formatted.underageCloseDelayMs);
                                            }
                                        }, 1000);
                                    } else if (formatted.underageCloseDelayMs > 0) {
                                        pendingUnderageCloseTimer = setTimeout(function () {
                                            renderTerminal(['Must be 21 or over to enter']);
                                            pendingUnderageCloseTimer = null;

                                            pendingUnderageExitTimer = setTimeout(function () {
                                                try {

                                                    // ignore close errors
                                                }
                                                if (!window.closed) {
                                                    window.location.href = 'about:blank';
                                                }
                                                pendingUnderageExitTimer = null;
                                            }, 1000);
                                        }, formatted.underageCloseDelayMs);
                                    }

                                    if (scannerWindow) {
                                        scannerWindow.style.display = 'none';

            <script aria-label="Account_Created_Window_Script">
                (function () {
                    var scanner = document.querySelector('.PDF417_Scanner');
                    var idScannerRoot = document.querySelector('.Id_Scanner');
                    var page1Main = document.querySelector('.Page_1_Main');
                    var accountCreatedWindow = document.querySelector('.Account_Created_Window');
                    var accountCreatedMessage = document.getElementById('Account_Created_Window_Message');
                    var accountCreatedLoginButton = document.getElementById('Account_Created_Window_Login');
                    var accountCreatedCloseButton = document.getElementById('Account_Created_Window_Close');
                    var ACCOUNT_API_BASE = String(window.ACCOUNT_API_BASE || '').replace(/\/$/, '');
                    var loginTransitionTimer = null;

                    function escapeHtml(value) {
                        return String(value || '')
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;');
                    }

                    async function sha256Hex(value) {
                        if (!window.crypto || !window.crypto.subtle || typeof TextEncoder === 'undefined') {
                            return null;
                        }

                        var input = String(value || '');
                        var encoded = new TextEncoder().encode(input);
                        var digestBuffer = await window.crypto.subtle.digest('SHA-256', encoded);
                        var digestArray = Array.from(new Uint8Array(digestBuffer));
                        return digestArray.map(function (byte) {
                            return byte.toString(16).padStart(2, '0');
                        }).join('');
                    }

                    async function cloudHasAccountHash(hash) {
                        var safeHash = String(hash || '').toLowerCase();
                        if (safeHash.length !== 64) {
                            return false;
                        }

                        var response = await fetch(ACCOUNT_API_BASE + '/api/account-hashes/' + encodeURIComponent(safeHash));
                        if (!response.ok) {
                            throw new Error('Cloud lookup failed');
                        }
                        var payload = await response.json();
                        return !!(payload && payload.exists);
                    }

                    function hideAccountCreatedWindow() {
                        if (accountCreatedWindow) {
                            accountCreatedWindow.style.display = 'none';
                        }
                    }

                    function requestFullscreenMode() {
                        var root = document.documentElement;
                        if (!root) {
                            return;
                        }
                        if (document.fullscreenElement) {
                            return;
                        }

                        var request =
                            root.requestFullscreen ||
                            root.webkitRequestFullscreen ||
                            root.msRequestFullscreen;

                        if (typeof request === 'function') {
                            try {
                                request.call(root);
                            } catch (error) {
                                // ignore fullscreen errors
                            }
                        }
                    }

                    function showAccountCreatedWindow(matchedHash) {
                        if (!accountCreatedWindow || !accountCreatedMessage) {
                            return;
                        }

                        accountCreatedMessage.innerHTML =
                            'An account already exists for this ID data.' +
                            '<br><br>Account SHA-256 Output:<br>' +
                            '<span style="display:inline-block;max-width:220px;overflow-wrap:anywhere;word-break:break-word;">' + escapeHtml(matchedHash) + '</span>';

                        accountCreatedWindow.style.display = 'flex';
                    }

                    hideAccountCreatedWindow();

                    if (accountCreatedLoginButton) {
                        accountCreatedLoginButton.addEventListener('click', function () {
                            hideAccountCreatedWindow();
                            if (loginTransitionTimer) {
                                clearTimeout(loginTransitionTimer);
                            }
                            loginTransitionTimer = setTimeout(function () {
                                if (page1Main) {
                                    page1Main.style.display = 'flex';
                                }
                                if (idScannerRoot) {
                                    idScannerRoot.style.display = 'none';
                                }
                                requestFullscreenMode();
                                loginTransitionTimer = null;
                            }, 3000);
                        });
                    }

                    if (accountCreatedCloseButton) {
                        accountCreatedCloseButton.addEventListener('click', function () {
                            hideAccountCreatedWindow();
                        });
                    }

                    if (!scanner) {
                        return;
                    }

                    scanner.addEventListener('pdf417-scan', async function (event) {
                        hideAccountCreatedWindow();

                        var detail = event && event.detail;
                        var parsed = detail && detail.parsed;
                        if (!parsed) {
                            return;
                        }

                        var fullName = parsed.fullName || '-';
                        var licenseNumber = parsed.licenseNumber || '-';
                        var dob = parsed.dateOfBirth || '-';
                        var accountHash = await sha256Hex(fullName + licenseNumber + dob);
                        if (!accountHash) {
                            return;
                        }

                        try {
                            if (await cloudHasAccountHash(accountHash)) {
                                showAccountCreatedWindow(accountHash);
                                return;
                            }
                        } catch (error) {
                            // cloud unavailable: do not show duplicate-account window
                        }
                    });
                })();
            </script>
