<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- --Book_Mark - (Color Variables Style)--------------------- -->
    <style aria-label="Color_Vars">
        :root {
            --Main_UI_Button: #00000031;
            --Main_UI_Text_Color: #ffffff;
            --Main_UI_Backdrop: blur(20px);
            --Main_Font_Size: 10px;
        }
    </style>

    <!-- --Book_Mark - (Global Styles)--------------------- -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Main_Font', monospace;
        }

        *::before {
            content: attr(class) attr(id);
            position: absolute;
            font-size: 8px;
            color: yellow;
            background: rgba(0, 0, 0, 0.582);
            padding: 2px;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }

        @font-face {
            font-family: 'Main_Font';
            src: url('Fonts/bront-master/bront-master/DejaVuSansMono.ttf') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            width: 100dvw;
            height: 100dvh;
        }
    </style>

    <div class="Dev_Settings">
        <div class="Buttons">
            <button id="Dev_Settings_Lables">LAB</button>
            <button id="Dev_Settings_Border">BOR</button>
        </div>
        <style aria-label="Dev_Settings_Style">
            .Dev_Settings {
                position: absolute;
                right: 10px;
                top: 10px;
                width: 30px;
                height: 55px;
                background: rgb(0, 0, 0);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons {
                display: flex;
                flex-direction: column;
                gap: 5px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .Dev_Settings .Buttons button {
                width: 20px;
                height: 20px;
                background: rgb(0, 119, 255);
                outline: none;
                border: none;
                font-size: 8px;
                color: rgb(255, 255, 255);
            }
        </style>
        <script aria-label="Dev_Settings_Script">

            const devSettings = document.querySelector('.Dev_Settings');
            let isDragging = false;
            let offsetX, offsetY;

            devSettings.addEventListener('mousedown', function(e) {
                isDragging = true;
                offsetX = e.clientX - devSettings.offsetLeft;
                offsetY = e.clientY - devSettings.offsetTop;
            });

            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.clientX - offsetX) + 'px';
                    devSettings.style.top = (e.clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('mouseup', function() {
                isDragging = false;
            });

            devSettings.addEventListener('touchstart', function(e) {
                isDragging = true;
                offsetX = e.touches[0].clientX - devSettings.offsetLeft;
                offsetY = e.touches[0].clientY - devSettings.offsetTop;
            });

            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    devSettings.style.left = (e.touches[0].clientX - offsetX) + 'px';
                    devSettings.style.top = (e.touches[0].clientY - offsetY) + 'px';
                }
            });

            document.addEventListener('touchend', function() {
                isDragging = false;
            });
            
        
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Lables').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-labels-style';
                    const existingStyle = document.getElementById('dev-labels-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '*::before { display: flex !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
            
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('Dev_Settings_Border').addEventListener('click', function() {
                    const style = document.createElement('style');
                    style.id = 'dev-border-style';
                    const existingStyle = document.getElementById('dev-border-style');
                    if (existingStyle) {
                        existingStyle.remove();
                    } else {
                        style.textContent = '* { border: 1px solid red !important; }';
                        document.head.appendChild(style);
                    }
                });
            });
        </script>
    </div>
</head>
<body>
    <!-- --Book_Mark - (Body Styles)--------------------- -->
    <!-- --Book_Mark - (Id_Scanner Container)--------------------- -->
    <div class="Id_Scanner">
        
        <!-- --Book_Mark - (Wallpaper Section)--------------------- -->
        <div class="Wallpaper">
            <img src="/Images/Wallpaper/Untitled(0).png" alt="">

            <!-- --Book_Mark - (Wallpaper Styles)--------------------- -->
            <style aria-label="Wallpaper_Style">
                .Wallpaper {
                    width: 100%;
                    height: 100%;
                }
                
                .Wallpaper img {
                    object-fit: cover;
                    width: 100%;
                    height: 100%;
                }
            </style>
        </div>
        <!-- --Book_Mark - (Scanner Section)--------------------- -->
        <div class="Scanner">
            <!-- --Book_Mark - (Scanner Window)--------------------- -->
            <div class="Scanner_Window">
                <p id="Opening_Window_Text">Welcome to My lesbian story.com, join where the best stories happen (Worth living for)! Just scan your state ID to create an account</p>
                <button id="Scan_ID_Button">Scan State ID</button>

                <!-- --Book_Mark - (Opening Window Text Styles)--------------------- -->
                <style aria-label="Opening_Window_Text_Style">
                    #Opening_Window_Text {
                        font-size: var(--Main_Font_Size);
                        color: var(--Main_UI_Text_Color);
                    }

                    .Scanner_Window {
                        width: 300px;
                        height: 200px;
                        background-color: var(--Main_UI_Button);
                        backdrop-filter: var(--Main_UI_Backdrop);
                        display: flex;
                        justify-content: center;
                        align-items: center;
                    }

                    .Scanner .Scanner_Window p {
                        position: absolute;
                        top: 20px;
                        width: calc(100% - 40px);
                        text-align: center;
                    }
                    
                    .Scanner button {
                        position: absolute;
                        bottom: 20px;
                        width: 150px;
                        height: 30px;
                        border: none;
                        outline: none;
                        cursor: pointer;
                        background-color: var(--Main_UI_Button);
                        color: var(--Main_UI_Text_Color);
                        font-size: var(--Main_Font_Size);
                    }
                </style>
                <script aria-label="Scanner_Window_Script">

                    document.getElementById('Scan_ID_Button').addEventListener('click', function() {
                        document.querySelector('.Scanner_Windows').style.display = 'flex';
                        document.querySelector('.PDF417_Scanner_Window').style.display = 'flex';
                    });

                    
                </script>
            </div>
            
            
            <!-- --Book_Mark - (Scanner Styles)--------------------- -->
            <style aria-label="Scanner_Style">
                .Scanner {
                    position: absolute;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                }
            </style>
        </div>

        
        <!-- --Book_Mark - (Scanner_Windows Container)--------------------- -->
        <div class="Scanner_Windows">

            <!-- --Book_Mark - (ID_Scanner Modal)--------------------- -->
            <div class="PDF417_Scanner_Window">

                <button id="PDF417_Scanner_Close">[Close]</button>
                <div class="PDF417_Scanner">
                    <!-- --Book_Mark - (PDF417_Scanner Styles)--------------------- -->
                    <style aria-label="PDF417_Scanner_Window_Style">
                        .PDF417_Scanner {
                            width: calc(100% - 60px);
                            height: calc(100% - 60px);
                            background-color: rgba(255, 255, 255, 0.1);
                        }
                    </style>

                    <!-- --Book_Mark - (PDF417_Scanner Script)--------------------- -->
                    <script aria-label="PDF417_Scanner_Script">
                        (function () {
                            const scannerHost = document.querySelector('.PDF417_Scanner');
                            const openButton = document.getElementById('Scan_ID_Button');
                            const closeButton = document.getElementById('PDF417_Scanner_Close');

                            if (!scannerHost || !openButton || scannerHost.dataset.pdf417Init === 'true') {
                                return;
                            }
                            scannerHost.dataset.pdf417Init = 'true';

                            scannerHost.style.position = 'relative';
                            scannerHost.style.overflow = 'hidden';

                            const preview = document.createElement('video');
                            preview.className = 'PDF417_Preview';
                            preview.setAttribute('playsinline', 'true');
                            preview.autoplay = true;
                            preview.muted = true;
                            preview.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
                            scannerHost.appendChild(preview);

                            const sightOverlay = document.createElement('div');
                            sightOverlay.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:2;';

                            const corners = [
                                { top: '10px', left: '10px', borderTop: '2px solid #00ff99', borderLeft: '2px solid #00ff99' },
                                { top: '10px', right: '10px', borderTop: '2px solid #00ff99', borderRight: '2px solid #00ff99' },
                                { bottom: '10px', left: '10px', borderBottom: '2px solid #00ff99', borderLeft: '2px solid #00ff99' },
                                { bottom: '10px', right: '10px', borderBottom: '2px solid #00ff99', borderRight: '2px solid #00ff99' }
                            ];

                            corners.forEach(function (cornerStyle) {
                                const corner = document.createElement('div');
                                corner.style.position = 'absolute';
                                corner.style.width = '26px';
                                corner.style.height = '26px';
                                Object.keys(cornerStyle).forEach(function (k) {
                                    corner.style[k] = cornerStyle[k];
                                });
                                sightOverlay.appendChild(corner);
                            });

                            const reticle = document.createElement('div');
                            reticle.style.cssText = 'position:absolute;left:50%;top:50%;width:280px;max-width:95%;height:104px;transform:translate(-50%,-50%);border:1px dashed rgba(0,255,153,.9);box-shadow:0 0 12px rgba(0,255,153,.35);';
                            sightOverlay.appendChild(reticle);
                            scannerHost.appendChild(sightOverlay);

                            let stream = null;
                            let detector = null;
                            let running = false;
                            let animationFrameId = null;
                            let lastRawValue = '';
                            let lastScanAt = 0;
                            let audioContext = null;
                            let html5QrCode = null;
                            let usingFallbackScanner = false;

                            const terminal = document.getElementById('Terminal_Text');
                            const logWindow = document.querySelector('.Log_Window');
                            const scannerWindow = document.querySelector('.PDF417_Scanner_Window');
                            const scannerWindows = document.querySelector('.Scanner_Windows');

                            function debugBeep() {
                                try {
                                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                                    if (!AudioCtx) {
                                        return;
                                    }
                                    if (!audioContext) {
                                        audioContext = new AudioCtx();
                                    }
                                    if (audioContext.state === 'suspended') {
                                        audioContext.resume();
                                    }
                                    const oscillator = audioContext.createOscillator();
                                    const gainNode = audioContext.createGain();
                                    oscillator.type = 'sine';
                                    oscillator.frequency.value = 1046.5;
                                    gainNode.gain.value = 0.14;
                                    oscillator.connect(gainNode);
                                    gainNode.connect(audioContext.destination);
                                    oscillator.start();
                                    oscillator.stop(audioContext.currentTime + 0.16);
                                } catch (error) {
                                    // no-op
                                }
                            }

                            function primeAudioContext() {
                                try {
                                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                                    if (!AudioCtx) {
                                        return;
                                    }
                                    if (!audioContext) {
                                        audioContext = new AudioCtx();
                                    }
                                    if (audioContext.state === 'suspended') {
                                        audioContext.resume();
                                    }
                                } catch (error) {
                                    // no-op
                                }
                            }

                            function flashDetection() {
                                scannerHost.style.boxShadow = 'inset 0 0 0 2px #00ff99, 0 0 18px rgba(0,255,153,.8)';
                                setTimeout(function () {
                                    scannerHost.style.boxShadow = 'none';
                                }, 150);
                            }

                            function parseAamva(rawText) {
                                const cleaned = (rawText || '').replace(/[\u001e\u001f]/g, '\n').replace(/\r/g, '\n');
                                const lines = cleaned.split('\n').map(function (line) { return line.trim(); }).filter(Boolean);
                                const fields = {};

                                function extractLicenseFromRaw(text) {
                                    const normalized = String(text || '').replace(/\s+/g, ' ');
                                    const patterns = [
                                        /DAQ\s*([A-Z0-9-]{4,})/i,
                                        /DLN\s*([A-Z0-9-]{4,})/i,
                                        /LIC(?:ENSE)?\s*(?:NUMBER|NO|#)?\s*[:#-]?\s*([A-Z0-9-]{4,})/i
                                    ];

                                    for (var i = 0; i < patterns.length; i++) {
                                        const match = normalized.match(patterns[i]);
                                        if (match && match[1]) {
                                            return match[1].trim();
                                        }
                                    }

                                    return null;
                                }

                                lines.forEach(function (line) {
                                    const match = line.match(/^(D[A-Z0-9]{2})(.*)$/);
                                    if (match) {
                                        fields[match[1]] = match[2].trim();
                                    }
                                });

                                if (!Object.keys(fields).length) {
                                    const compact = cleaned.replace(/\n+/g, ' ');
                                    const tokenPattern = /(D[A-Z0-9]{2})([\s\S]*?)(?=D[A-Z0-9]{2}|$)/g;
                                    let tokenMatch;

                                    while ((tokenMatch = tokenPattern.exec(compact)) !== null) {
                                        const key = tokenMatch[1];
                                        const value = (tokenMatch[2] || '').trim();
                                        if (key && value && !fields[key]) {
                                            fields[key] = value;
                                        }
                                    }
                                }

                                const resolvedLicenseNumber = (fields.DAQ || '').trim() || extractLicenseFromRaw(cleaned) || extractLicenseFromRaw(rawText) || null;

                                return {
                                    firstName: fields.DAC || null,
                                    middleName: fields.DAD || null,
                                    lastName: fields.DCS || null,
                                    nameSuffix: fields.DCU || null,
                                    fullName: [fields.DAC, fields.DAD, fields.DCS, fields.DCU].filter(Boolean).join(' ').trim() || null,
                                    licenseNumber: resolvedLicenseNumber,
                                    dateOfBirth: fields.DBB || null,
                                    expirationDate: fields.DBA || null,
                                    issueDate: fields.DBD || null,
                                    sex: fields.DBC || null,
                                    street: fields.DAG || null,
                                    city: fields.DAI || null,
                                    state: fields.DAJ || null,
                                    postalCode: fields.DAK || null,
                                    rawFields: fields
                                };
                            }

                            function writeScanToTerminal(scan) {
                                if (!terminal || !scan || !scan.parsed) {
                                    return;
                                }

                                const parsed = scan.parsed;
                                const lines = [
                                    'My Lesbian Story',
                                    'User:\\> ',
                                    'Scan successful:',
                                    'Full Name: ' + (parsed.fullName || '-'),
                                    'License Number: ' + (parsed.licenseNumber || '-'),
                                    'DOB: ' + (parsed.dateOfBirth || '-'),
                                    'Expires: ' + (parsed.expirationDate || '-'),
                                    'Address: ' + [parsed.street, parsed.city, parsed.state, parsed.postalCode].filter(Boolean).join(', '),
                                    '',
                                    'RAW:',
                                    String(scan.raw || '')
                                ];

                                terminal.innerHTML = lines.map(function (line) {
                                    return String(line)
                                        .replace(/&/g, '&amp;')
                                        .replace(/</g, '&lt;')
                                        .replace(/>/g, '&gt;');
                                }).join('<br>') + '<br><span class="cursor">_</span>';

                                if (logWindow) {
                                    logWindow.style.display = 'flex';
                                }
                            }

                            function publishResult(rawValue) {
                                if (!rawValue) {
                                    return;
                                }

                                const now = Date.now();
                                if (rawValue === lastRawValue && now - lastScanAt < 1500) {
                                    return;
                                }

                                lastRawValue = rawValue;
                                lastScanAt = now;
                                debugBeep();
                                flashDetection();

                                window.lastPDF417Scan = {
                                    raw: rawValue,
                                    parsed: parseAamva(rawValue),
                                    timestamp: Date.now()
                                };

                                writeScanToTerminal(window.lastPDF417Scan);

                                scannerHost.dispatchEvent(new CustomEvent('pdf417-scan', {
                                    detail: window.lastPDF417Scan
                                }));

                                stopScanner();

                                if (scannerWindow) {
                                    scannerWindow.style.display = 'none';
                                }
                                if (scannerWindows) {
                                    scannerWindows.style.display = 'flex';
                                }
                                if (logWindow) {
                                    logWindow.style.display = 'flex';
                                }
                            }

                            async function ensureNativeDetector() {
                                if (!('BarcodeDetector' in window)) {
                                    throw new Error('BarcodeDetector unavailable');
                                }
                                const formats = await BarcodeDetector.getSupportedFormats();
                                if (!formats.includes('pdf417')) {
                                    throw new Error('pdf417 not supported natively');
                                }
                                detector = new BarcodeDetector({ formats: ['pdf417'] });
                            }

                            function loadScript(src) {
                                return new Promise(function (resolve, reject) {
                                    const existing = document.querySelector('script[data-src="' + src + '"]');
                                    if (existing) {
                                        if (window.Html5Qrcode) {
                                            resolve();
                                            return;
                                        }
                                        existing.addEventListener('load', resolve, { once: true });
                                        existing.addEventListener('error', reject, { once: true });
                                        return;
                                    }

                                    const s = document.createElement('script');
                                    s.src = src;
                                    s.async = true;
                                    s.dataset.src = src;
                                    s.onload = resolve;
                                    s.onerror = reject;
                                    document.head.appendChild(s);
                                });
                            }

                            async function startFallbackScanner() {
                                const fallbackCdn = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
                                await loadScript(fallbackCdn);
                                if (!window.Html5Qrcode || !window.Html5QrcodeSupportedFormats) {
                                    throw new Error('Fallback scanner failed to load');
                                }

                                if (!scannerHost.id) {
                                    scannerHost.id = 'PDF417_Scanner_Host';
                                }

                                usingFallbackScanner = true;
                                preview.style.display = 'none';

                                html5QrCode = new window.Html5Qrcode(scannerHost.id, { verbose: false });
                                await html5QrCode.start(
                                    { facingMode: 'environment' },
                                    {
                                        fps: 14,
                                        qrbox: function (viewfinderWidth, viewfinderHeight) {
                                            return {
                                                width: Math.floor(Math.min(viewfinderWidth * 0.95, 320)),
                                                height: Math.floor(Math.min(viewfinderHeight * 0.48, 132))
                                            };
                                        },
                                        formatsToSupport: [window.Html5QrcodeSupportedFormats.PDF_417]
                                    },
                                    function (decodedText) {
                                        publishResult(decodedText);
                                    },

                                    function () {
                                        // ignore misses
                                    }
                                );
                            }

                            async function startScanner() {
                                try {
                                    if (!window.isSecureContext) {
                                        alert('Camera access requires https:// or http://localhost in Chrome/Edge.');
                                        return;
                                    }

                                    primeAudioContext();

                                    stopScanner();

                                    stream = await navigator.mediaDevices.getUserMedia({
                                        video: {
                                            facingMode: { ideal: 'environment' },
                                            width: { ideal: 1920 },
                                            height: { ideal: 1080 }
                                        },
                                        audio: false
                                    });
                                    preview.style.display = 'block';
                                    preview.srcObject = stream;
                                    await preview.play();

                                    try {
                                        await ensureNativeDetector();
                                        usingFallbackScanner = false;
                                    } catch (nativeError) {
                                        if (stream) {
                                            stream.getTracks().forEach(function (track) {
                                                track.stop();
                                            });
                                        }
                                        stream = null;
                                        preview.srcObject = null;
                                        detector = null;
                                        await startFallbackScanner();
                                    }

                                    running = true;
                                    scanFrame();
                                } catch (error) {
                                    if (!stream && !html5QrCode) {
                                        alert('Unable to start scanner. Allow camera permission and try again.');
                                    }
                                }
                            }

                            function stopScanner() {
                                running = false;

                                if (animationFrameId) {
                                    cancelAnimationFrame(animationFrameId);
                                    animationFrameId = null;
                                }

                                if (stream) {
                                    stream.getTracks().forEach(function (track) {
                                        track.stop();
                                    });
                                }
                                stream = null;
                                preview.srcObject = null;

                                if (html5QrCode) {
                                    const qr = html5QrCode;
                                    html5QrCode = null;
                                    qr.stop().catch(function () {
                                        // ignore cleanup errors
                                    });
                                }

                                detector = null;
                                usingFallbackScanner = false;
                                preview.style.display = 'block';
                            }

                            async function scanFrame() {
                                if (!running) {
                                    return;
                                }

                                if (!usingFallbackScanner && detector && preview.readyState >= 2) {
                                    try {
                                        const codes = await detector.detect(preview);
                                        if (codes.length > 0 && codes[0].rawValue) {
                                            publishResult(codes[0].rawValue);
                                        }
                                    } catch (error) {
                                        // ignore decode frame errors
                                    }
                                }

                                animationFrameId = requestAnimationFrame(scanFrame);
                            }

                            openButton.addEventListener('click', startScanner);
                            if (closeButton) {
                                closeButton.addEventListener('click', stopScanner);
                            }
                            window.addEventListener('beforeunload', stopScanner);
                        })();
                    </script>
                </div>

                <!-- --Book_Mark - (PDF417_Scanner_Window Styles)--------------------- -->
                <style aria-label="PDF417_Scanner_Window_Style">
                    .PDF417_Scanner_Window {
                        position: absolute;
                        width: 300px;
                        height: 300px;
                        background-color: rgba(0, 0, 0, 0.281);
                        backdrop-filter: var(--Main_UI_Backdrop);
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        overflow: hidden;
                        display: none;
                    }

                    #PDF417_Scanner_Close {
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        background: none;
                        border: none;
                        outline: none;
                        cursor: pointer;
                        color: var(--Main_UI_Text_Color);
                        font-size: var(--Main_Font_Size);
                    }
                </style>

                <!-- --Book_Mark - (PDF417_Scanner_Window Script)--------------------- -->
                <script aria-label="PDF417_Scanner_Window_Script">

                    document.getElementById('PDF417_Scanner_Close').addEventListener('click', function() {
                        document.querySelector('.Scanner_Windows').style.display = 'none';
                        document.querySelector('.PDF417_Scanner_Window').style.display = 'none';
                    });

                    
                </script>
            </div>

            <!-- --Book_Mark - (Log_Window Container)--------------------- -->
            <div class="Log_Window">

                <!-- --Book_Mark - (Log_Window Close Button)--------------------- -->
                <button id="Log_Window_Close">[Close]</button>
                <div class="Log_Terminal">
                    <p id="Terminal_Text">My Lesbian Story</p>

                    <style aria-label="Log_Window_Terminal_Style">

                        .Log_Terminal {
                            width: 100%;
                            height: 100%;
                            background-color: black;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                        }

                        .Log_Terminal #Terminal_Text {
                            position: absolute;
                            bottom: 10px;
                            width: calc(100% - 20px);
                            height: calc(100% - 40px);
                            color: var(--Main_UI_Text_Color);
                            font-size: var(--Main_Font_Size);
                            overflow-y: auto;
                        }
                    </style>
                    <script aria-label="Log_Window_Terminal_Script">
                        (function () {
                            var terminal = document.getElementById('Terminal_Text');
                            var scanner = document.querySelector('.PDF417_Scanner');
                            var scannerWindows = document.querySelector('.Scanner_Windows');
                            var scannerWindow = document.querySelector('.PDF417_Scanner_Window');
                            var logWindow = document.querySelector('.Log_Window');
                            var pendingEligibilityTimer = null;
                            var pendingUnderageCloseTimer = null;
                            var pendingUnderageExitTimer = null;
                            var pendingAccountPromptTimer = null;
                            var pendingNoCloseTimer = null;

                            function escapeHtml(value) {
                                return String(value || '')
                                    .replace(/&/g, '&amp;')
                                    .replace(/</g, '&lt;')
                                    .replace(/>/g, '&gt;');
                            }

                            function renderLine(line) {
                                if (line && typeof line === 'object' && line.promptLabel) {
                                    return '<span>' + escapeHtml(line.promptLabel) + '</span> <input class="terminal-prompt-input" type="text" autocomplete="off" style="background:transparent;border:none;outline:none;color:inherit;font:inherit;width:140px;" />';
                                }
                                if (line && typeof line === 'object' && line.text !== undefined) {
                                    var safeText = escapeHtml(line.text);
                                    if (line.anchorId) {
                                        return '<span data-anchor="' + escapeHtml(line.anchorId) + '">' + safeText + '</span>';
                                    }
                                    if (line.color) {
                                        return '<span style="color:' + escapeHtml(line.color) + '">' + safeText + '</span>';
                                    }
                                    return safeText;
                                }
                                return escapeHtml(line);
                            }

                            function renderTerminal(lines) {
                                var content = ['My Lesbian Story', ''].concat(lines || []);
                                terminal.innerHTML = content.map(renderLine).join('<br>');
                            }

                            function stripPromptLines(lines) {
                                return (lines || []).filter(function (line) {
                                    return !(line && typeof line === 'object' && line.promptLabel);
                                });
                            }

                            function scrollAnchorToMiddle(anchorId) {
                                var anchor = terminal.querySelector('[data-anchor="' + anchorId + '"]');
                                if (!anchor) {
                                    return;
                                }
                                anchor.scrollIntoView({ block: 'center' });
                            }

                            function attachAccountPromptHandler(formatted, currentLines) {
                                var promptInput = terminal.querySelector('.terminal-prompt-input');
                                if (!promptInput) {
                                    return;
                                }

                                promptInput.focus();

                                promptInput.addEventListener('keydown', function (event) {
                                    if (event.key !== 'Enter') {
                                        return;
                                    }

                                    event.preventDefault();
                                    var typedValue = String(promptInput.value || '').trim();
                                    var typedLower = typedValue.toLowerCase();
                                    var baseContextLines = stripPromptLines(currentLines);
                                    var outputLines = baseContextLines.concat(['User:\\> ' + typedValue]);

                                    if (typedLower === 'yes') {
                                        outputLines = outputLines.concat(formatted.nextSectionLines || []);
                                        renderTerminal(outputLines);
                                        scrollAnchorToMiddle('next-section-anchor');
                                        return;
                                    }

                                    if (typedLower === 'no') {
                                        outputLines = outputLines.concat(['Account creation canceled.']);
                                        renderTerminal(outputLines);

                                        if (pendingNoCloseTimer) {
                                            clearTimeout(pendingNoCloseTimer);
                                            pendingNoCloseTimer = null;
                                        }
                                        pendingNoCloseTimer = setTimeout(function () {
                                            if (logWindow) {
                                                logWindow.style.display = 'none';
                                            }
                                            if (scannerWindows) {
                                                scannerWindows.style.display = 'none';
                                            }
                                            pendingNoCloseTimer = null;
                                        }, 2000);
                                        return;
                                    }

                                    outputLines = outputLines.concat(['Unknown Command', '', { promptLabel: 'User:\\>' }]);
                                    renderTerminal(outputLines);
                                    attachAccountPromptHandler(formatted, outputLines);
                                });
                            }

                            function parseDobToDate(rawDob) {
                                var digits = String(rawDob || '').replace(/\D/g, '');
                                if (digits.length !== 8) {
                                    return null;
                                }

                                var year;
                                var month;
                                var day;

                                if (/^(19|20)\d{2}/.test(digits)) {
                                    year = Number(digits.slice(0, 4));
                                    month = Number(digits.slice(4, 6));
                                    day = Number(digits.slice(6, 8));
                                } else {
                                    month = Number(digits.slice(0, 2));
                                    day = Number(digits.slice(2, 4));
                                    year = Number(digits.slice(4, 8));
                                }

                                var date = new Date(year, month - 1, day);
                                if (
                                    date.getFullYear() !== year ||
                                    date.getMonth() !== month - 1 ||
                                    date.getDate() !== day
                                ) {
                                    return null;
                                }

                                return date;
                            }

                            function calculateAge(rawDob) {
                                var birthDate = parseDobToDate(rawDob);
                                if (!birthDate) {
                                    return null;
                                }

                                var today = new Date();
                                var age = today.getFullYear() - birthDate.getFullYear();
                                var monthDiff = today.getMonth() - birthDate.getMonth();
                                var dayDiff = today.getDate() - birthDate.getDate();

                                if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
                                    age -= 1;
                                }

                                return age;
                            }

                            function formatScan(detail) {
                                if (!detail || !detail.parsed) {
                                    return {
                                        baseLines: [
                                            'Scan successful (raw payload captured):',
                                            String((detail && detail.raw) || '-').slice(0, 700)
                                        ],
                                        delayedLines: [],
                                        accountPromptLines: [],
                                        nextSectionLines: [],
                                        accountPromptDelayMs: 0,
                                        underageCloseDelayMs: 0
                                    };
                                }

                                var parsed = detail.parsed;
                                var hasParsedData = !!(
                                    parsed.fullName ||
                                    parsed.licenseNumber ||
                                    parsed.dateOfBirth ||
                                    parsed.expirationDate ||
                                    parsed.street ||
                                    parsed.city ||
                                    parsed.state ||
                                    parsed.postalCode
                                );

                                if (!hasParsedData) {
                                    return {
                                        baseLines: [
                                            'Scan successful (raw payload captured):',
                                            String((detail && detail.raw) || '-').slice(0, 700)
                                        ],
                                        delayedLines: [],
                                        accountPromptLines: [],
                                        nextSectionLines: [],
                                        accountPromptDelayMs: 0,
                                        underageCloseDelayMs: 0
                                    };
                                }

                                var age = calculateAge(parsed.dateOfBirth);
                                var isEligible = age !== null && age >= 21;//Age requirement var//
                                var eligibilityMessage = isEligible
                                    ? 'you are eligible to create an account'
                                    : 'must be 21 or older to enter';
                                var verificationColor = isEligible ? '#00ff99' : '#ff4d4d';
                                var accountPromptLines = isEligible
                                    ? [
                                        '',
                                        'Account Creation:',
                                        'Do you want to create an account?',
                                        'commands = "Yes" "No"',
                                        '',
                                        { promptLabel: 'User:\\>' }
                                    ]
                                    : [];

                                var nextSectionLines = [
                                    { text: 'What I\'m going to do is take your full name, you\'re license number and your DOB...Then im going to combine those values and create a SHA-256 output, This is how your account will be created. its the most secure way of making your account', anchorId: 'next-section-anchor' }
                                ];

                                return {
                                    baseLines: [
                                        'Scan successful:',
                                        '',
                                        'Full Name: ' + (parsed.fullName || '-'),
                                        'License Number: ' + (parsed.licenseNumber || '-'),
                                        'DOB: ' + (parsed.dateOfBirth || '-'),
                                        'Expires: ' + (parsed.expirationDate || '-'),
                                        'Address: ' + [parsed.street, parsed.city, parsed.state, parsed.postalCode].filter(Boolean).join(', '),
                                        'Raw Size: ' + String((detail && detail.raw ? detail.raw.length : 0)) + ' chars'
                                    ],
                                    delayedLines: [
                                        '',
                                        { text: 'Age Verification:', color: verificationColor },
                                        { text: eligibilityMessage, color: verificationColor },
                                        { text: 'User Age: ' + (age === null ? '-' : String(age)), color: verificationColor }
                                    ],
                                    accountPromptLines: accountPromptLines,
                                    nextSectionLines: nextSectionLines,
                                    accountPromptDelayMs: accountPromptLines.length ? 1000 : 0,
                                    underageCloseDelayMs: isEligible ? 0 : 1000 //Time out 1//
                                };
                            }

                            renderTerminal();

                            if (scanner) {
                                scanner.addEventListener('pdf417-scan', function (event) {
                                    var formatted = formatScan(event.detail);
                                    renderTerminal(formatted.baseLines);

                                    if (pendingEligibilityTimer) {
                                        clearTimeout(pendingEligibilityTimer);
                                        pendingEligibilityTimer = null;
                                    }
                                    if (pendingUnderageCloseTimer) {
                                        clearTimeout(pendingUnderageCloseTimer);
                                        pendingUnderageCloseTimer = null;
                                    }
                                    if (pendingUnderageExitTimer) {
                                        clearTimeout(pendingUnderageExitTimer);
                                        pendingUnderageExitTimer = null;
                                    }
                                    if (pendingAccountPromptTimer) {
                                        clearTimeout(pendingAccountPromptTimer);
                                        pendingAccountPromptTimer = null;
                                    }
                                    if (pendingNoCloseTimer) {
                                        clearTimeout(pendingNoCloseTimer);
                                        pendingNoCloseTimer = null;
                                    }

                                    if (formatted.delayedLines && formatted.delayedLines.length) {
                                        pendingEligibilityTimer = setTimeout(function () {
                                            renderTerminal(formatted.baseLines.concat(formatted.delayedLines));
                                            pendingEligibilityTimer = null;

                                            if (formatted.accountPromptLines && formatted.accountPromptLines.length) {
                                                pendingAccountPromptTimer = setTimeout(function () {
                                                    var promptSectionLines = formatted.baseLines.concat(
                                                        formatted.delayedLines,
                                                        formatted.accountPromptLines
                                                    );
                                                    renderTerminal(promptSectionLines);
                                                    pendingAccountPromptTimer = null;
                                                    attachAccountPromptHandler(formatted, promptSectionLines);
                                                }, formatted.accountPromptDelayMs || 1000);
                                            }

                                            if (formatted.underageCloseDelayMs > 0) {
                                                pendingUnderageCloseTimer = setTimeout(function () {
                                                    renderTerminal(
                                                        formatted.baseLines.concat(
                                                            formatted.delayedLines,
                                                            ['', { text: 'Must be 21 or over to enter', color: '#ff4d4d' }]
                                                        )
                                                    );
                                                    pendingUnderageCloseTimer = null;

                                                    pendingUnderageExitTimer = setTimeout(function () {
                                                        try {
                                                            window.open('', '_self');
                                                            window.close();
                                                        } catch (error) {
                                                            // ignore close errors
                                                        }
                                                        if (!window.closed) {
                                                            window.location.href = 'about:blank';
                                                        }
                                                        pendingUnderageExitTimer = null;
                                                    }, 1000);
                                                }, formatted.underageCloseDelayMs);
                                            }
                                        }, 1000);
                                    } else if (formatted.underageCloseDelayMs > 0) {
                                        pendingUnderageCloseTimer = setTimeout(function () {
                                            renderTerminal(['Must be 21 or over to enter']);
                                            pendingUnderageCloseTimer = null;

                                            pendingUnderageExitTimer = setTimeout(function () {
                                                try {
                                                    window.open('', '_self');
                                                    window.close();
                                                } catch (error) {
                                                    // ignore close errors
                                                }
                                                if (!window.closed) {
                                                    window.location.href = 'about:blank';
                                                }
                                                pendingUnderageExitTimer = null;
                                            }, 1000);
                                        }, formatted.underageCloseDelayMs);
                                    }

                                    if (scannerWindow) {
                                        scannerWindow.style.display = 'none';
                                    }

                                    if (scannerWindows) {
                                        scannerWindows.style.display = 'flex';
                                    }
                                    if (logWindow) {
                                        logWindow.style.display = 'flex';
                                    }
                                });
                            }

                            // Removed the setInterval function for cursor blink
                        })();
                    </script>
                    
                </div>

                <!-- --Book_Mark - (Log_Window Styles)--------------------- -->
                <style aria-label="Log_Window_Style">
                    .Log_Window {
                        position: absolute;
                        z-index: 4;
                        width: 300px;
                        height: 400px;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        overflow: hidden;
                        display: none;
                    }

                    #Log_Window_Close {
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        background: none;
                        border: none;
                        outline: none;
                        cursor: pointer;
                        color: var(--Main_UI_Text_Color);
                        font-size: var(--Main_Font_Size);
                    }
                </style>
                <!-- --Book_Mark - (Log_Window Script)--------------------- -->
                <script aria-label="Log_Window_Script">
                    document.getElementById('Log_Window_Close').addEventListener('click', function() {
                        document.querySelector('.Scanner_Windows').style.display = 'none';
                        document.querySelector('.Log_Window').style.display = 'none';
                    });
                    
                </script>
            </div>

            <!-- --Book_Mark - (Scanner_Windows Styles)--------------------- -->
            <style aria-label="Scanner_Windows_Style">
                .Scanner_Windows {
                    position: absolute;
                    width: 100dvw;
                    height: 100dvh;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    overflow: hidden;
                    background-color: rgba(0, 0, 0, 0.226);
                    backdrop-filter: var(--Main_UI_Backdrop);
                    display: none;
                }
            </style>

            <!-- --Book_Mark - (Scanner_Windows Script)--------------------- -->
            <script aria-label="Scanner_Windows_Script">

            </script>
            
        </div>

        <!-- --Book_Mark - (Id_Scanner Styles)--------------------- -->
        <style aria-label="Id_Scanner_Style">
            .Id_Scanner {
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }
        </style>
    </div>
